<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>시그표 관리</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Cute+Font&family=Do+Hyeon&family=East+Sea+Dokdo&family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Hi+Melody&family=Jua&family=Nanum+Gothic:wght@400;700;800&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500;600;700;800&family=Share+Tech+Mono&family=Sunflower:wght@300;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e12;
    --surface: #181820;
    --surface-2: #20202a;
    --border: #2a2a36;
    --text: #f0f0f4;
    --muted: #8a8a99;
    --accent: #ff8c52;
    --accent-2: #5ab0ff;
    --danger: #ff5c6c;
    --warn: #ffcc44;
    --ok: #4cd97b;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }
  body { padding: 16px; padding-bottom: 80px; max-width: 720px; margin: 0 auto; }

  h1 { font-size: 20px; margin: 0 0 12px; }
  h2 { font-size: 15px; margin: 0 0 8px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  h3 { font-size: 16px; margin: 0; font-weight: 700; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
  .row  { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .row > * { min-width: 0; }
  .grow { flex: 1 1 auto; }

  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 15px; font-family: inherit;
    appearance: none; -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }

  button {
    border: 0; border-radius: 8px; padding: 9px 14px; font-size: 14px; font-weight: 600;
    background: var(--surface-2); color: var(--text); cursor: pointer; font-family: inherit;
    border: 1px solid var(--border);
  }
  button.primary { background: var(--accent); color: #1a0e08; border-color: var(--accent); }
  button.danger  { background: transparent; color: var(--danger); border-color: var(--danger); }
  button.ghost   { background: transparent; }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .4; cursor: not-allowed; }

  .item-row { display: grid; grid-template-columns: 1.2fr 1.6fr auto auto auto; gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--border); }
  .item-row:last-child { border-bottom: 0; }
  .item-row input { padding: 8px 10px; font-size: 14px; }
  .color-dot { width: 28px; height: 28px; padding: 0; border-radius: 50%; border: 1px solid var(--border); background: var(--surface-2); position: relative; overflow: hidden; }
  .color-dot input[type="color"] { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; cursor: pointer; opacity: 0; }
  .color-dot.has-color { border-color: var(--accent); }

  .pages-list .page-card { border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; background: var(--surface-2); }
  .pages-list .page-card .header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .pages-list .page-card .header .count {
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: var(--bg); color: var(--muted); border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .pages-list .page-card .header .count.warn { color: var(--warn); border-color: var(--warn); }
  .pages-list .page-card .header .count.over { color: var(--danger); border-color: var(--danger); }

  .toolbar { position: sticky; top: 0; z-index: 5; background: rgba(14,14,18,0.9); backdrop-filter: blur(8px); padding: 12px 16px; margin: -16px -16px 12px; border-bottom: 1px solid var(--border); }
  .toolbar .row { justify-content: space-between; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 999px; background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }
  .badge.ok  { color: var(--ok); border-color: var(--ok); }
  .badge.err { color: var(--danger); border-color: var(--danger); }

  #preview-wrap {
    background: repeating-conic-gradient(#1c1c24 0% 25%, #15151c 0% 50%) 50% / 24px 24px;
    border-radius: 8px; overflow: hidden;
    width: 300px; height: 400px; max-width: 100%;
    position: relative;
  }
  #preview-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

  .muted { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="row">
    <h1 style="margin:0;">시그표 관리</h1>
    <span id="conn-badge" class="badge">연결중…</span>
  </div>
</div>

<!-- 전체 설정 -->
<div class="card">
  <h2>전체 설정</h2>
  <div class="row">
    <div class="grow" style="min-width:160px;">
      <label>테마 프리셋</label>
      <select id="cfg-theme"></select>
    </div>
    <div class="grow" style="min-width:160px;">
      <label>전역 폰트 (비우면 테마 기본)</label>
      <select id="cfg-font"></select>
    </div>
  </div>
  <div class="row" style="margin-top:10px;">
    <div class="grow" style="min-width:150px;">
      <label>전환 효과</label>
      <select id="cfg-transition-type"></select>
    </div>
    <div style="width:130px;">
      <label>페이지 전환(ms)</label>
      <input id="cfg-interval" type="number" min="1500" step="500" />
    </div>
    <div style="width:130px;">
      <label>전환 속도(ms)</label>
      <input id="cfg-transition" type="number" min="0" step="50" />
    </div>
    <div style="width:110px;">
      <label>캔버스 너비</label>
      <input id="cfg-w" type="number" min="100" step="10" />
    </div>
    <div style="width:110px;">
      <label>캔버스 높이</label>
      <input id="cfg-h" type="number" min="100" step="10" />
    </div>
  </div>
  <p class="muted" style="margin:8px 0 0;">페이지당 최대 항목수는 캔버스 높이에서 자동 계산됩니다.</p>
</div>

<!-- 페이지 목록 -->
<div class="card">
  <div class="row" style="margin-bottom:10px;">
    <h2 style="margin:0;">회전 페이지</h2>
    <button id="page-add" class="primary" style="margin-left:auto;">+ 새 페이지</button>
  </div>
  <div id="pages-list" class="pages-list"></div>
</div>

<!-- 프리뷰 -->
<div class="card">
  <h2>실시간 프리뷰</h2>
  <div id="preview-wrap"><iframe id="preview-frame" src="index.html?preview=1"></iframe></div>
  <p class="muted" style="margin:8px 0 0;">실제 송출과 1:1 크기. 데이터 수정 시 자동 갱신.</p>
</div>

<p class="muted" style="text-align:center;">모든 변경사항은 입력 즉시 자동 저장됩니다.</p>

<script type="module">
import {
  app, rootRef, db, ref, onValue, set, get
} from "./shared.js";
import {
  THEMES, FONTS, DEFAULT_DATA, normalizeData, maxItemsPerPage
} from "./shared.js";
import {
  getAuth, signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let state = JSON.parse(JSON.stringify(DEFAULT_DATA));
const $conn = document.getElementById("conn-badge");

// 테마 옵션
const $theme = document.getElementById("cfg-theme");
for (const [k, v] of Object.entries(THEMES)) {
  const o = document.createElement("option");
  o.value = k; o.textContent = v.name;
  $theme.appendChild(o);
}
// 전환 효과 옵션
const TRANSITIONS = [
  ["fade",    "페이드"],
  ["slide",   "슬라이드 (좌우)"],
  ["slideup", "슬라이드 (위로)"],
  ["zoomin",  "줌인"],
  ["zoomout", "줌아웃"],
  ["blur",    "블러"],
  ["rotate",  "회전"],
  ["none",    "없음 (즉시)"]
];
const $trans = document.getElementById("cfg-transition-type");
for (const [v, label] of TRANSITIONS) {
  const o = document.createElement("option");
  o.value = v; o.textContent = label;
  $trans.appendChild(o);
}

// 폰트 옵션 (첫 칸은 "테마 기본")
const $font = document.getElementById("cfg-font");
{
  const o = document.createElement("option");
  o.value = ""; o.textContent = "(테마 기본)";
  $font.appendChild(o);
}
for (const f of FONTS) {
  const o = document.createElement("option");
  o.value = f.name; o.textContent = f.name;
  o.style.fontFamily = f.family;
  $font.appendChild(o);
}

// Firebase 구독
onValue(rootRef, (snap) => {
  state = normalizeData(snap.val());
  renderAll();
  $conn.textContent = "동기화됨"; $conn.className = "badge ok";
}, (err) => {
  $conn.textContent = "DB 오류"; $conn.className = "badge err";
  console.error(err);
});

// ── 익명 인증 ───────────────────────────────────────────────
// 로그인 화면 없이 자동으로 인증 토큰을 받아 쓰기 권한을 확보한다.
// (index.html은 읽기 전용이라 인증 불필요. 보안 규칙의 ".write": "auth != null" 과 짝)
const auth = getAuth(app);
signInAnonymously(auth)
  .then(() => {
    // 최초 1회: 데이터가 없으면 기본값 생성
    get(rootRef).then(snap => {
      if (!snap.exists()) set(rootRef, DEFAULT_DATA);
    });
  })
  .catch((err) => {
    $conn.textContent = "인증 오류"; $conn.className = "badge err";
    console.error("anon auth:", err);
  });

// 전역 핸들러
document.getElementById("cfg-theme").addEventListener("change", e => {
  state.config.activeTheme = e.target.value; saveConfig();
});
document.getElementById("cfg-font").addEventListener("change", e => {
  state.config.fontFamily = e.target.value; saveConfig();
});
document.getElementById("cfg-interval").addEventListener("change", e => {
  state.config.pageInterval = Math.max(1500, +e.target.value || 5000); saveConfig();
});
document.getElementById("cfg-transition").addEventListener("change", e => {
  state.config.transitionMs = Math.max(0, +e.target.value || 500); saveConfig();
});
document.getElementById("cfg-transition-type").addEventListener("change", e => {
  state.config.transitionType = e.target.value || "fade"; saveConfig();
});
document.getElementById("cfg-w").addEventListener("change", e => {
  state.config.canvasWidth = Math.max(100, +e.target.value || 300); saveConfig();
});
document.getElementById("cfg-h").addEventListener("change", e => {
  state.config.canvasHeight = Math.max(100, +e.target.value || 400); saveConfig();
});

document.getElementById("page-add").addEventListener("click", () => {
  state.pages.push({
    id: "p" + Date.now(), name: "새 페이지", header: "", theme: null, fontFamily: null,
    items: [{ amount: "0", label: "새 항목", color: null }]
  });
  savePages();
});

// ── 렌더링 ────────────────────────────────────────────
function renderAll() {
  document.getElementById("cfg-theme").value      = state.config.activeTheme;
  document.getElementById("cfg-font").value       = state.config.fontFamily || "";
  document.getElementById("cfg-interval").value   = state.config.pageInterval;
  document.getElementById("cfg-transition").value = state.config.transitionMs;
  document.getElementById("cfg-transition-type").value = state.config.transitionType || "fade";
  document.getElementById("cfg-w").value          = state.config.canvasWidth;
  document.getElementById("cfg-h").value          = state.config.canvasHeight;

  // 프리뷰도 캔버스 크기에 맞춤
  const wrap = document.getElementById("preview-wrap");
  wrap.style.width  = state.config.canvasWidth  + "px";
  wrap.style.height = state.config.canvasHeight + "px";

  renderPages();
}

function renderPages() {
  const $list = document.getElementById("pages-list");
  $list.innerHTML = "";
  state.pages.forEach((page, pi) => {
    const effectiveTheme = page.theme || state.config.activeTheme;
    const hasHeader = !!(page.header && page.header.trim());
    const maxItems = maxItemsPerPage(state.config.canvasHeight, effectiveTheme, hasHeader);
    const count    = page.items.length;
    let countClass = "count";
    if (count > maxItems)        countClass = "count over";
    else if (count === maxItems) countClass = "count warn";

    const card = document.createElement("div");
    card.className = "page-card";
    card.innerHTML = `
      <div class="header">
        <h3 contenteditable="true" spellcheck="false" class="page-name grow">${escapeHtml(page.name)}</h3>
        <span class="${countClass}" title="현재 항목수 / 최대">${count} / ${maxItems}</span>
        <button class="ghost btn-up"   title="위로">▲</button>
        <button class="ghost btn-down" title="아래로">▼</button>
        <button class="danger btn-del" title="페이지 삭제">×</button>
      </div>
      <div class="row" style="margin-bottom:8px;">
        <div class="grow">
          <label>화면 헤더 (선택 — 비우면 표시 안 함)</label>
          <input type="text" class="page-header-input" placeholder="예: VIP시그">
        </div>
      </div>
      <div class="row" style="margin-bottom:8px; gap:8px;">
        <div class="grow" style="min-width:140px;">
          <label>이 페이지 테마 (비우면 전역)</label>
          <select class="page-theme">
            <option value="">(전역)</option>
            ${Object.entries(THEMES).map(([k,v]) => `<option value="${k}">${v.name}</option>`).join("")}
          </select>
        </div>
        <div class="grow" style="min-width:140px;">
          <label>이 페이지 폰트 (비우면 전역)</label>
          <select class="page-font">
            <option value="">(전역)</option>
            ${FONTS.map(f => `<option value="${escapeHtml(f.name)}">${escapeHtml(f.name)}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="items"></div>
      <div class="row" style="margin-top:8px;">
        <button class="ghost btn-add-item" ${count >= maxItems ? "disabled" : ""}>+ 항목 추가</button>
        ${count >= maxItems ? `<span class="muted">한도 도달 — 캔버스 높이를 늘리거나 항목을 줄이세요.</span>` : ""}
      </div>
    `;
    card.querySelector(".page-name").addEventListener("blur", e => {
      page.name = e.target.textContent.trim() || "(이름 없음)"; savePages();
    });
    const headerInp = card.querySelector(".page-header-input");
    headerInp.value = page.header || "";
    headerInp.addEventListener("change", e => {
      page.header = e.target.value; savePages();
    });
    const themeSel = card.querySelector(".page-theme");
    themeSel.value = page.theme || "";
    themeSel.addEventListener("change", e => {
      page.theme = e.target.value || null; savePages();
    });
    const fontSel = card.querySelector(".page-font");
    fontSel.value = page.fontFamily || "";
    fontSel.addEventListener("change", e => {
      page.fontFamily = e.target.value || null; savePages();
    });
    card.querySelector(".btn-up").addEventListener("click", () => {
      if (pi <= 0) return;
      [state.pages[pi-1], state.pages[pi]] = [state.pages[pi], state.pages[pi-1]];
      savePages();
    });
    card.querySelector(".btn-down").addEventListener("click", () => {
      if (pi >= state.pages.length - 1) return;
      [state.pages[pi+1], state.pages[pi]] = [state.pages[pi], state.pages[pi+1]];
      savePages();
    });
    card.querySelector(".btn-del").addEventListener("click", () => {
      if (confirm(`"${page.name}" 페이지를 삭제할까요?`)) {
        state.pages.splice(pi, 1); savePages();
      }
    });
    card.querySelector(".btn-add-item").addEventListener("click", () => {
      if (page.items.length >= maxItems) return;
      page.items.push({ amount: "0", label: "새 항목", color: null });
      savePages();
    });

    const $items = card.querySelector(".items");
    page.items.forEach((it, ii) => {
      const row = document.createElement("div");
      row.className = "item-row";
      row.innerHTML = `
        <input type="text" data-k="amount" placeholder="15,000">
        <input type="text" data-k="label"  placeholder="라벨">
        <button class="color-dot ${it.color ? 'has-color' : ''}" title="라벨 색상 override">
          <span style="display:block;width:100%;height:100%;background:${it.color || 'transparent'};"></span>
          <input type="color" value="${it.color || '#ffffff'}">
        </button>
        <button class="ghost btn-clear-color" title="색 초기화">⟲</button>
        <button class="danger btn-del-item" title="삭제">×</button>
      `;
      row.querySelectorAll("input[data-k]").forEach(inp => {
        const k = inp.dataset.k;
        inp.value = it[k] || "";
        inp.addEventListener("change", () => { it[k] = inp.value; savePages(); });
      });
      row.querySelector('input[type="color"]').addEventListener("change", e => {
        it.color = e.target.value; savePages();
      });
      row.querySelector(".btn-clear-color").addEventListener("click", () => {
        it.color = null; savePages();
      });
      row.querySelector(".btn-del-item").addEventListener("click", () => {
        page.items.splice(ii, 1); savePages();
      });
      $items.appendChild(row);
    });

    $list.appendChild(card);
  });
}

// ── 저장 ────────────────────────────────────────────
async function saveConfig() { await set(ref(db, "signtable/config"), state.config); flash(); }
async function savePages()  { await set(ref(db, "signtable/pages"),  state.pages);  flash(); }

let flashTimer = null;
function flash() {
  $conn.textContent = "저장됨 ✓"; $conn.className = "badge ok";
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => {
    $conn.textContent = "동기화됨"; $conn.className = "badge ok";
  }, 1200);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
</script>
</body>
</html>
