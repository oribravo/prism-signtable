<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>시그표 오버레이</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Cute+Font&family=Do+Hyeon&family=East+Sea+Dokdo&family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Hi+Melody&family=Jua&family=Nanum+Gothic:wght@400;700;800&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500;600;700;800&family=Share+Tech+Mono&family=Sunflower:wght@300;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width:  var(--canvas-w, 300px);
    height: var(--canvas-h, 400px);
    background: transparent;
    overflow: hidden;
    font-family: var(--font-family, 'Noto Sans KR', sans-serif);
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }

  #pages-panel {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    font-family: var(--font-family);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }
  .page-card {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: var(--panel-radius);
    padding: var(--panel-padding);
    display: grid;
    grid-template-columns: var(--amount-col, auto) 1fr;
    gap: var(--row-gap) 16px;
    align-items: baseline;
    text-shadow: var(--text-shadow);
    opacity: 0;
    transition: opacity var(--transition-ms, 500ms) ease,
                transform var(--transition-ms, 500ms) ease,
                filter var(--transition-ms, 500ms) ease;
    width: 100%;
    position: absolute;
    top: 0; left: 0;
    transform-origin: center center;
    font-family: var(--font-family);
  }
  .page-card.is-active { opacity: 1; position: relative; }

  /* ── 페이지 전환 효과 (#pages-panel 의 fx-* 클래스로 제어) ── */
  /* fx-fade(기본): 추가 변형 없음, opacity 만 */
  #pages-panel.fx-slide   .page-card           { transform: translateX(60px); }
  #pages-panel.fx-slide   .page-card.is-active { transform: translateX(0); }

  #pages-panel.fx-slideup .page-card           { transform: translateY(40px); }
  #pages-panel.fx-slideup .page-card.is-active { transform: translateY(0); }

  #pages-panel.fx-zoomin  .page-card           { transform: scale(0.80); }
  #pages-panel.fx-zoomin  .page-card.is-active { transform: scale(1); }

  #pages-panel.fx-zoomout .page-card           { transform: scale(1.15); }
  #pages-panel.fx-zoomout .page-card.is-active { transform: scale(1); }

  #pages-panel.fx-blur    .page-card           { filter: blur(10px); }
  #pages-panel.fx-blur    .page-card.is-active { filter: blur(0); }

  #pages-panel.fx-rotate  .page-card           { transform: rotate(-4deg) scale(0.9); }
  #pages-panel.fx-rotate  .page-card.is-active { transform: rotate(0) scale(1); }

  #pages-panel.fx-none    .page-card           { transition: none; }
  .page-card .amount {
    color: var(--amount-color);
    font-size: var(--amount-size);
    font-weight: var(--amount-weight);
    font-variant-numeric: tabular-nums;
    text-align: right;
    white-space: nowrap;
    line-height: 1.25;
  }
  .page-card .label {
    color: var(--label-color);
    font-size: var(--label-size);
    font-weight: var(--label-weight);
    white-space: nowrap;
    line-height: 1.25;
  }
  /* 페이지 헤더(선택) — 카드 상단 전체폭 제목 */
  .page-card .page-header {
    grid-column: 1 / -1;
    min-width: 0;
    text-align: center;
    color: var(--amount-color);
    font-size: calc(var(--amount-size) * 1.15);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 4px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--panel-border);
    white-space: normal;
    word-break: keep-all;
  }

  #status {
    position: fixed; left: 4px; bottom: 4px;
    font-size: 10px; color: rgba(255,255,255,0.25);
    pointer-events: none; user-select: none;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }
  #status.error { color: rgba(255, 80, 80, 0.7); }
</style>
</head>
<body>
  <div id="pages-panel"></div>
  <div id="status">connecting…</div>

<script type="module">
import {
  rootRef, onValue
} from "./shared.js";
import {
  THEMES, DEFAULT_DATA, applyTheme, applyPageOverride, normalizeData
} from "./shared.js";

const $status = document.getElementById("status");
const $pages  = document.getElementById("pages-panel");
const root    = document.documentElement;

const params = new URLSearchParams(location.search);
const urlW = params.get("w"), urlH = params.get("h");

let state = DEFAULT_DATA;
let currentPageIdx = 0;
let rotateTimer = null;

applyTheme(root, state.config.activeTheme, state.config.fontFamily);
applyCanvas();
applyTransition();
root.style.setProperty("--transition-ms", state.config.transitionMs + "ms");

onValue(rootRef, (snap) => {
  state = normalizeData(snap.val());
  applyTheme(root, state.config.activeTheme, state.config.fontFamily);
  applyCanvas();
  applyTransition();
  root.style.setProperty("--transition-ms", state.config.transitionMs + "ms");
  renderPages();
  restartRotation();
  $status.textContent = "live";
  $status.classList.remove("error");
}, (err) => {
  console.error(err);
  $status.textContent = "DB 연결 실패: " + err.message;
  $status.classList.add("error");
});

function applyCanvas() {
  const w = urlW || state.config.canvasWidth  || 300;
  const h = urlH || state.config.canvasHeight || 400;
  root.style.setProperty("--canvas-w", w + "px");
  root.style.setProperty("--canvas-h", h + "px");
}

function applyTransition() {
  const t = state.config.transitionType || "fade";
  $pages.className = "fx-" + t;
}

function renderPages() {
  $pages.innerHTML = "";
  state.pages.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "page-card";
    card.dataset.idx = i;
    applyPageOverride(card, p, state.config.fontFamily);
    if (p.header && p.header.trim()) {
      const h = document.createElement("div");
      h.className = "page-header";
      h.textContent = p.header;
      card.appendChild(h);
    }
    for (const it of (p.items || [])) {
      const a = document.createElement("div"); a.className = "amount"; a.textContent = it.amount || "";
      const l = document.createElement("div"); l.className = "label";  l.textContent = it.label  || "";
      if (it.color) l.style.color = it.color;
      card.append(a, l);
    }
    $pages.appendChild(card);
  });
  if (currentPageIdx >= state.pages.length) currentPageIdx = 0;
  alignAmounts();
  showPage(currentPageIdx);
}

// 모든 페이지를 통틀어 가장 긴 금액 폭으로 금액 칼럼 폭을 고정.
// → 자릿수가 다른 페이지로 전환돼도 숫자 우측 정렬·라벨 시작점이 일정.
function alignAmounts() {
  root.style.setProperty("--amount-col", "auto");
  let max = 0;
  $pages.querySelectorAll(".amount").forEach(el => {
    const w = el.getBoundingClientRect().width;
    if (w > max) max = w;
  });
  if (max > 0) root.style.setProperty("--amount-col", Math.ceil(max) + "px");
}

function showPage(idx) {
  const cards = $pages.querySelectorAll(".page-card");
  cards.forEach((c, i) => c.classList.toggle("is-active", i === idx));
}

function restartRotation() {
  if (rotateTimer) clearInterval(rotateTimer);
  if (state.pages.length <= 1) { showPage(0); return; }
  rotateTimer = setInterval(() => {
    currentPageIdx = (currentPageIdx + 1) % state.pages.length;
    showPage(currentPageIdx);
  }, Math.max(1500, state.config.pageInterval | 0));
}

if (params.get("preview") === "1") $status.style.display = "none";

// 웹폰트 로딩 완료 후 폭이 바뀌므로 금액 칼럼 재정렬
if (document.fonts && document.fonts.ready) document.fonts.ready.then(alignAmounts);
</script>
</body>
</html>
